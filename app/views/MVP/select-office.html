{% extends "layouts/main-v2.html" %}

{% block pageTitle %}
  Content page template – {{ serviceName }} – GOV.UK Prototype Kit
{% endblock %}



{% block content %}

<form method="post" action="./case-list">

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">

      <div class="govuk-form-group">
        <fieldset class="govuk-fieldset">
          <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
            <h1 class="govuk-fieldset__heading">
              Select the office you're recording cases from
            </h1>
          </legend>
          <div class="govuk-radios" data-module="govuk-radios">
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="office-1" name="office" type="radio" value="0X395U">
              <label class="govuk-label govuk-radios__label" for="office-1">
                Welsh Housing Aid LTD Ta Shelter Cymru, Maynard Street, Cardiff, CF10 2AA
              </label>
              <div id="office-1-hint" class="govuk-hint govuk-radios__hint">
                0X395U
              </div>
            </div>
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="office-2" name="office" type="radio" value="2N078D">
              <label class="govuk-label govuk-radios__label" for="office-2">
                Welsh Housing Aid LTD Ta Shelter Cymru, Store Street, Cardiff, CF10 1EP
              </label>
              <div id="office-2-hint" class="govuk-hint govuk-radios__hint">
                2N078D
              </div>
            </div>
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="office-3" name="office" type="radio" value="A123456">
              <label class="govuk-label govuk-radios__label" for="office-3">
                Lawyers Inc, 102 Petty France, London, SW1H 9EA
              </label>
              <div id="office-3-hint" class="govuk-hint govuk-radios__hint">
                A123456
              </div>
            </div>
          </div>
        </fieldset>
      </div>
      
      {{ govukButton({
        text: "Continue"
      }) }}

    </div>
  </div>


  </form>

{% endblock %}
